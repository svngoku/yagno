id: simple_researcher
name: Simple Research Agent
description: A single agent that searches the web and reports findings.
persistent: false

agents:
  - id: researcher
    name: Researcher
    model: openrouter:x-ai/grok-4.20
    tools: [tavily_search]
    prompt_file: prompts/researcher.md
    markdown: true

tools:
  - id: tavily_search
    kind: tavily
    api_key_env: TAVILY_API_KEY
    search_depth: advanced

steps:
  - id: research
    kind: agent
    agent: researcher
